{% extends "base.html" %}
{% block title %}Reset Password — Smart Attendance{% endblock %}

{% block content %}
<style>
  .auth-wrap { max-width: 460px; margin: 2rem auto; }
  .auth-card { background: var(--card); border: 1px solid var(--border); border-radius: 22px;
    box-shadow: var(--shadow-lg); overflow: hidden; }
  .auth-top { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); padding: 2rem; text-align: center; color: #fff; position: relative; }
  .auth-top::after { content: ''; position: absolute; inset: 0;
    background: radial-gradient(circle at 70% 30%, rgba(255,255,255,.1) 0%, transparent 60%); }
  .auth-top * { position: relative; z-index: 1; }
  .auth-top .av { width: 64px; height: 64px; border-radius: 50%; margin: 0 auto 1rem;
    background: rgba(255,255,255,.2); backdrop-filter: blur(10px);
    display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
  .auth-top h2 { font-weight: 800; font-size: 1.4rem; margin-bottom: .2rem; }
  .auth-top p { opacity: .85; font-size: .88rem; margin: 0; }
  .auth-body { padding: 1.8rem 2rem; }
  .auth-body label { font-weight: 600; font-size: .85rem; display: block; margin-bottom: 6px; color: var(--text2); }
  .auth-body .fg { position: relative; margin-bottom: 1rem; }
  .auth-body .fg i.fa-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    color: var(--text2); font-size: .9rem; pointer-events: none; }
  .auth-body input[type="password"] {
    width: 100%; padding: .65rem .75rem .65rem 2.4rem; border: 2px solid var(--border);
    border-radius: 12px; background: var(--bg2); color: var(--text); font-size: .9rem;
    outline: none; transition: border-color .25s, box-shadow .25s;
  }
  .auth-body input:focus { border-color: #43e97b; box-shadow: 0 0 0 3px rgba(67,233,123,.12); }
  .auth-footer { text-align: center; padding: 1rem 2rem 1.5rem; border-top: 1px solid var(--border); }
  .auth-footer a { color: var(--c1); font-weight: 600; }

  .pw-toggle { position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    cursor: pointer; color: var(--text2); font-size: .9rem; z-index: 2; }

  .strength-bar { height: 4px; border-radius: 2px; margin-top: 6px; background: var(--border); overflow: hidden; }
  .strength-fill { height: 100%; border-radius: 2px; width: 0; transition: width .4s, background .4s; }
  .strength-text { font-size: .75rem; margin-top: 3px; color: var(--text2); }
</style>

<div class="auth-wrap anim-scale">
  <div class="auth-card">
    <div class="auth-top">
      <div class="av"><i class="fas fa-lock-open"></i></div>
      <h2>Reset Password</h2>
      <p>Create a new secure password for your account</p>
    </div>
    <div class="auth-body">
      <form method="POST" action="{{ url_for('reset_password', token=token) }}" id="resetForm">
        <label>New Password</label>
        <div class="fg">
          <i class="fas fa-lock fa-icon"></i>
          <input type="password" name="password" id="pw1" placeholder="Enter new password" required minlength="6">
          <span class="pw-toggle" onclick="togglePw('pw1', this)"><i class="fas fa-eye"></i></span>
        </div>
        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
        <div class="strength-text" id="strengthText"></div>

        <label style="margin-top:1rem;">Confirm Password</label>
        <div class="fg">
          <i class="fas fa-shield-halved fa-icon"></i>
          <input type="password" name="confirm_password" id="pw2" placeholder="Confirm new password" required minlength="6">
          <span class="pw-toggle" onclick="togglePw('pw2', this)"><i class="fas fa-eye"></i></span>
        </div>
        <div id="matchMsg" style="font-size:.78rem;margin-top:-6px;margin-bottom:8px;"></div>

        <button type="submit" class="btn-g btn-green lg" style="width:100%;justify-content:center;margin-top:.8rem;" id="resetBtn" disabled>
          <i class="fas fa-check-circle"></i> Reset Password
        </button>
      </form>
    </div>
    <div class="auth-footer">
      <a href="{{ url_for('teacher_login') }}"><i class="fas fa-arrow-left"></i> Back to Login</a>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
function togglePw(id, el) {
  const inp = document.getElementById(id);
  const icon = el.querySelector('i');
  if (inp.type === 'password') { inp.type = 'text'; icon.className = 'fas fa-eye-slash'; }
  else { inp.type = 'password'; icon.className = 'fas fa-eye'; }
}

(function(){
  const pw1 = document.getElementById('pw1');
  const pw2 = document.getElementById('pw2');
  const fill = document.getElementById('strengthFill');
  const stxt = document.getElementById('strengthText');
  const match = document.getElementById('matchMsg');
  const btn = document.getElementById('resetBtn');

  function checkStrength(val) {
    let s = 0;
    if (val.length >= 6) s++;
    if (val.length >= 10) s++;
    if (/[A-Z]/.test(val)) s++;
    if (/[0-9]/.test(val)) s++;
    if (/[^A-Za-z0-9]/.test(val)) s++;
    return s;
  }

  function validate() {
    const v = pw1.value, c = pw2.value;
    const s = checkStrength(v);
    const colors = ['#ef4444','#f97316','#eab308','#22c55e','#10b981'];
    const labels = ['Very Weak','Weak','Fair','Strong','Very Strong'];
    fill.style.width = (s * 20) + '%';
    fill.style.background = colors[s - 1] || '#ddd';
    stxt.textContent = v.length ? labels[s - 1] || '' : '';
    stxt.style.color = colors[s - 1] || '';

    if (c.length > 0) {
      if (v === c) { match.textContent = '✓ Passwords match'; match.style.color = '#22c55e'; }
      else { match.textContent = '✗ Passwords do not match'; match.style.color = '#ef4444'; }
    } else { match.textContent = ''; }

    btn.disabled = !(v.length >= 6 && v === c);
  }

  pw1.addEventListener('input', validate);
  pw2.addEventListener('input', validate);
})();
</script>
{% endblock %}
