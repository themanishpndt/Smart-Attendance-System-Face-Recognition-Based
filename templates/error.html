{% extends "base.html" %}
{% block title %}Error — Smart Attendance{% endblock %}
{% block content %}
<style>
  .err-wrap { max-width: 540px; margin: 3rem auto; text-align: center; }
  .err-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 20px;
    padding: 2.5rem 2rem; box-shadow: var(--shadow);
  }
  .err-icon { width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 1.5rem;
    display: flex; align-items: center; justify-content: center; font-size: 2rem; color: #fff; }
  .err-card h2 { font-weight: 700; font-size: 1.3rem; margin-bottom: .4rem; color: var(--c6); }
  .err-card p { color: var(--text2); font-size: .95rem; margin-bottom: 1.5rem; }
</style>
<div class="err-wrap anim-scale">
  <div class="err-card cbar-red">
    <div class="err-icon" style="background: linear-gradient(135deg,#ef476f,#f5576c);"><i class="fas fa-exclamation-triangle"></i></div>
    <h2>Something Went Wrong</h2>
    <p>{{ error if error else 'An unexpected error occurred. Please try again.' }}</p>
    <a href="{{ url_for('home') }}" class="btn-g btn-purple"><i class="fas fa-home"></i> Back Home</a>
  </div>
</div>
{% endblock %}
